.brand{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--ink);}

function setSendSeq(v){

function buildCartQueue(){
  const withItems = state.suppliers.filter(s=>s.products.some(p=>p.qty>0));

  const smss = withItems.filter(s=>s.contactType==='sms').map(s=>s.id);

}

function uid(){ return Math.random().toString(36).slice(2,9); }
function formatQty(q){ return String(Math.round(q*100)/100); }

function ordinal(day){
  const suf = (day>3 && day<21) ? 'th' : ['th','st','nd','rd'][day%10 > 3 ? 0 : day%10];
  return day + suf;
}
function formatDate(d){
  return ordinal(d.getDate()) + ' ' + d.toLocaleString('en-AU', {month:'long'});
}
function nextWeekday(name){
  const names = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const target = names.indexOf(String(name||'').toLowerCase());
  if(target < 0) return null;
  const now = new Date();
  let diff = (target - now.getDay() + 7) % 7;
  if(diff === 0) diff = 7;
  const d = new Date(now);
  d.setDate(now.getDate() + diff);
  return d;
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const ver = localStorage.getItem(VERSION_KEY);
    if(!raw || ver !== SEED_VERSION){
      state.suppliers = seed;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(seed));
    } else {
      state.suppliers = JSON.parse(raw);
    }
    localStorage.setItem(VERSION_KEY, SEED_VERSION);
  }catch(e){
    state.suppliers = seed;
  }
  render();
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.suppliers));
  }catch(e){ showToast('Not saved - storage unavailable'); }
}

function lastOrderKey(id){ return 'order-chit-lastorder-'+id; }
function getLastOrder(id){
  try{ const r = localStorage.getItem(lastOrderKey(id)); return r ? JSON.parse(r) : null; }
  catch(e){ return null; }
}
function saveLastOrder(supplier){
  const map = {};
  supplier.products.forEach(p=>{ if(p.qty>0) map[p.id] = p.qty; });
  try{ localStorage.setItem(lastOrderKey(supplier.id), JSON.stringify(map)); }catch(e){}
}

const HISTORY_KEY = 'order-chit-history';
function getHistory(){
  try{ const r = localStorage.getItem(HISTORY_KEY); return r ? JSON.parse(r) : []; }
  catch(e){ return []; }
}
function addHistory(supplier, items, dateWord){
  if(!items.length) return;
  const hist = getHistory();
  hist.unshift({
    id: uid(), supplierId: supplier.id, supplierName: supplier.name,
    dateWord: dateWord, ts: Date.now(),
    items: items.map(p=>({ pid:p.id, name:p.name, qty:p.qty, unit:p.unit }))
  });
  if(hist.length > 100) hist.length = 100;
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); }catch(e){}
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function goto(view){ state.view = view; render(); }
function findSupplier(id){ return state.suppliers.find(s=>s.id===id); }

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function buildMessage(supplier, items, dateWord){
  const t = supplier.template;
  if(t.mode === 'freeform'){
    const first = items[0] || {name:'', qty:0, unit:''};
    const itemLines = items.map(p=>`${p.name}: ${formatQty(p.qty)} ${p.unit}`).join('\n');
    return (t.body||'')
      .replaceAll('{date}', dateWord)
      .replaceAll('{items}', itemLines)
      .replaceAll('{qty}', formatQty(first.qty))
      .replaceAll('{unit}', first.unit)
      .replaceAll('{product}', first.name);
  }
  const lines = [];
  if(t.greeting) lines.push(t.greeting);
  if(t.orderLine) lines.push(t.orderLine.replaceAll('{date}', dateWord));
  lines.push('');
  items.forEach(p=> lines.push(`${p.name}: ${formatQty(p.qty)} ${p.unit}`));
  lines.push('');
  if(t.signoff) lines.push(t.signoff);
  return lines.join('\n');
}

function buildSendLink(supplier, message, subject){
  if(supplier.contactType === 'email'){
    return `mailto:${supplier.contact}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
  } else {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const sep = isIOS ? '&' : '?';
    return `sms:${supplier.contact}${sep}body=${encodeURIComponent(message)}`;
  }
}

  const v = state.view;
  const homeBtn = `<button class="home-btn" data-goto="list" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></button>`;
  let html = `<div class="brand"><h1>Order Chit</h1><div class="brand-right">${homeBtn}<span class="tag">v0.6 local</span></div></div>`;
  if(v.name === "list") html += renderList();

  else if(v.name === "ticket") html += renderTicket(v.id);
  else if(v.name === "addSupplier") html += renderAddSupplier();
  else if(v.name === "addProduct") html += renderAddProduct(v.id);

}

function renderSendSeq(){
  const seq = getSendSeq();
  if(!seq || !seq.ids || !seq.ids.length){
    return `
      <div class="crumb"><button data-goto="cart">&larr; Cart</button> / Send All</div>
      <div class="empty">Nothing to send.</div>
    `;
  }
  const total = seq.ids.length;
  const pills = seq.ids.map((id, i)=>{
    const sp = findSupplier(id);
    const nm = sp ? sp.name : '?';
    let cls = 'pill';
    let jump = '';
    if(i < seq.index){ cls += ' pill-done'; jump = `data-seq-jump="${i}"`; }
    else if(i === seq.index){ cls += ' pill-current'; }
    return `<span class="${cls}" ${jump}>${escapeHtml(nm)}${i<seq.index?' &check;':''}</span>`;
  }).join('');

  if(seq.index >= total){
    return `
      <div class="crumb"><button data-goto="list">&larr; Suppliers</button> / Send All</div>
      <div class="pill-row">${pills}</div>
      <div class="sendseq-done">All ${total} order${total===1?'':'s'} handed off</div>
      <div style="margin-top:14px;"><button class="btn btn-block btn-danger" data-clear-cart="1">Clear Cart</button></div>
      <div style="margin-top:10px;"><button class="btn btn-ghost btn-block" data-goto="list">Keep Items</button></div>
    `;
  }

  const s = findSupplier(seq.ids[seq.index]);
  if(!s){
    return `
      <div class="crumb"><button data-goto="list">&larr; Suppliers</button> / Send All</div>
      <div class="pill-row">${pills}</div>
      <div class="empty">That supplier is gone.</div>
      <div style="margin-top:10px;"><button class="btn btn-block" id="sendseq-skip">Skip &rarr;</button></div>
    `;
  }
  const items = s.products.filter(p=>p.qty>0);
  const msg = buildMessage(s, items, seq.dateWord);
  const subject = (s.template.subject||'').replaceAll('{date}', seq.dateWord);
  const link = buildSendLink(s, msg, subject);
  const verb = s.contactType==='email' ? 'Open email to' : 'Text';
  return `
    <div class="crumb"><button data-goto="list">&larr; Suppliers</button> / Send All</div>
    <div class="pill-row">${pills}</div>
    <div class="sendseq-count">Order ${seq.index+1} of ${total} &middot; ${escapeHtml(s.name)}</div>
    <div class="preview-box">${escapeHtml(msg)}</div>
    <a class="btn btn-block" id="sendseq-send" href="${link}" data-supplier="${s.id}">${verb} ${escapeHtml(s.name)} &rarr;</a>
    <div class="fallback-note">Send it, then come back &mdash; the next order loads automatically.</div>
    <div style="margin-top:10px;"><button class="btn btn-ghost btn-block" id="sendseq-skip">Skip This One</button></div>
    <div style="margin-top:10px;"><button class="btn btn-ghost btn-block" data-cancel-seq="1">Cancel Send All</button></div>
  `;
}

function bindContactToggle(){
  document.querySelectorAll('[data-contact-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('[data-contact-toggle]').forEach(b=>b.classList.remove('active'));
      el.classList.add('active');
      const type = el.dataset.contactToggle;
      const label = document.getElementById('contact-label');
      const input = document.getElementById('ns-contact') || document.getElementById('es-contact');
      if(label && input){
        if(type==='sms'){ label.textContent='Phone number'; input.placeholder='+61412345678'; input.setAttribute('inputmode','tel'); }
        else { label.textContent='Order email'; input.placeholder='orders@supplier.com.au'; input.setAttribute('inputmode','email'); }
      }
      const subjWrap = document.getElementById('subject-wrap');
      if(subjWrap) subjWrap.style.display = type==='email' ? 'block' : 'none';
    });
  });
}

function attachHandlers(){
  document.querySelectorAll('[data-open-supplier]').forEach(el=>{
    el.addEventListener('click', ()=> goto({name:"supplier", id:el.dataset.openSupplier}));
  });
  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=>{ goto({name:el.dataset.goto, id:el.dataset.supplier}); });
  });
  document.querySelectorAll('[data-qty-inc]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.qtyInc));
      const p = s.products.find(p=>p.id===el.dataset.qtyInc);
      p.qty = Math.round((p.qty+(p.inc||1))*100)/100; saveData(); render();
    });
  });
  document.querySelectorAll('[data-qty-dec]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.qtyDec));
      const p = s.products.find(p=>p.id===el.dataset.qtyDec);
      p.qty = Math.max(0, Math.round((p.qty-(p.inc||1))*100)/100); saveData(); render();
    });
  });
  document.querySelectorAll('[data-qty-input]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.qtyInput));
      const p = s.products.find(p=>p.id===el.dataset.qtyInput);
      let v = parseFloat(el.value);
      if(isNaN(v)||v<0) v = 0;
      p.qty = Math.round(v*100)/100;
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-del-product]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.delProduct));
      s.products = s.products.filter(p=>p.id!==el.dataset.delProduct);
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-repeat]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = findSupplier(el.dataset.repeat);
      const last = getLastOrder(s.id) || {};
      s.products.forEach(p=>{ p.qty = last[p.id] ? last[p.id] : 0; });
      saveData(); render(); showToast('Last order loaded');
    });
  });
  document.querySelectorAll('[data-clear]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = findSupplier(el.dataset.clear);
      s.products.forEach(p=>{ p.qty = 0; });
      saveData(); render(); showToast('Order cleared');
    });
  });
  document.querySelectorAll('[data-reorder]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const h = getHistory().find(x=>x.id===el.dataset.reorder);
      if(!h) return;
      const s = findSupplier(h.supplierId);
      if(!s){ showToast('Supplier no longer exists'); return; }
      h.items.forEach(it=>{
        const p = s.products.find(pp=>pp.id===it.pid) || s.products.find(pp=>pp.name===it.name);
        if(p){ p.qty = Math.round((p.qty + it.qty)*100)/100; }
      });
      saveData();
      goto({name:"supplier", id:s.id});
      showToast('Added to order');
    });
  });
  document.querySelectorAll('[data-cart-remove]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.cartRemove));
      const p = s.products.find(p=>p.id===el.dataset.cartRemove);
      p.qty = 0; saveData(); render();
    });
  });
  const cartTom = document.querySelector('[data-cart-date="tomorrow"]');
  if(cartTom) cartTom.addEventListener('click', ()=>{ cartDateWord='tomorrow'; cartDateMode='tomorrow'; render(); });
  const cartDateInput = document.getElementById('cart-date-input');
  if(cartDateInput) cartDateInput.addEventListener('change', (e)=>{
    if(!e.target.value) return;
    const d = new Date(e.target.value+'T00:00:00');
    cartDateWord = formatDate(d); cartDateMode = 'calendar'; render();
  });
  const sendAllBtn = document.getElementById('send-all-btn');
  if(sendAllBtn) sendAllBtn.addEventListener('click', ()=>{
    const ids = buildCartQueue();
    if(!ids.length){ showToast('Cart is empty'); return; }
    setSendSeq({ ids, index:0, dateWord: cartDateWord });
    goto({name:'sendseq'});
  });
  const seqSend = document.getElementById('sendseq-send');
  if(seqSend) seqSend.addEventListener('click', ()=>{
    const seq = getSendSeq(); if(!seq) return;
    const s = findSupplier(seqSend.dataset.supplier);
    if(s){
      const items = s.products.filter(p=>p.qty>0);
      saveLastOrder(s);
      addHistory(s, items, seq.dateWord);
    }
    seq.index += 1;
    setSendSeq(seq);
    // navigation to mail/SMS proceeds; UI advances when the app regains focus
  });
  const seqSkip = document.getElementById('sendseq-skip');
  if(seqSkip) seqSkip.addEventListener('click', ()=>{
    const seq = getSendSeq(); if(!seq) return;
    seq.index += 1; setSendSeq(seq); render();
  });
  document.querySelectorAll('[data-seq-jump]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const seq = getSendSeq(); if(!seq) return;
      const i = parseInt(el.dataset.seqJump, 10);
      if(i < seq.index){ seq.index = i; setSendSeq(seq); render(); }
    });
  });
  const cancelSeq = document.querySelector('[data-cancel-seq]');
  if(cancelSeq) cancelSeq.addEventListener('click', ()=>{ setSendSeq(null); goto({name:'cart'}); });
  const clearCart = document.querySelector('[data-clear-cart]');
  if(clearCart) clearCart.addEventListener('click', ()=>{
    state.suppliers.forEach(s=>s.products.forEach(p=>{ p.qty=0; }));
    setSendSeq(null); saveData(); goto({name:'list'}); showToast('Cart cleared');
  });
  document.querySelectorAll('[data-unit-chip]').forEach(el=>{
    el.addEventListener('click', ()=>{ document.getElementById('np-unit').value = el.dataset.unitChip; });
  });
  bindContactToggle();

  const saveSupBtn = document.querySelector('[data-save-supplier]');
  if(saveSupBtn){
    saveSupBtn.addEventListener('click', ()=>{
      const name = document.getElementById('ns-name').value.trim();
      const contact = document.getElementById('ns-contact').value.trim();
      const address = document.getElementById('ns-address').value.trim();
      const activeToggle = document.querySelector('[data-contact-toggle].active');
      const contactType = activeToggle ? activeToggle.dataset.contactToggle : 'sms';
      if(!name || !contact){ showToast('Name and contact required'); return; }
      state.suppliers.push({ id: uid(), name, contactType, contact, address, products: [], template: defaultTemplate(contactType) });
      saveData();
      goto({name:"list"});
    });
  }

  const saveProdBtn = document.querySelector('[data-save-product]');
  if(saveProdBtn){
    saveProdBtn.addEventListener('click', ()=>{
      const supplierId = saveProdBtn.dataset.saveProduct;
      const s = findSupplier(supplierId);
      const name = document.getElementById('np-name').value.trim();
      const unit = document.getElementById('np-unit').value.trim() || 'kg';
      let inc = parseFloat(document.getElementById('np-inc').value); if(isNaN(inc)||inc<=0) inc = 1;
      if(!name){ showToast('Product name required'); return; }
      s.products.push({ id: uid(), name, unit, qty:0, inc: Math.round(inc*100)/100 });
      saveData();
      goto({name:"supplier", id:supplierId});
    });
  }

  const saveSettingsBtn = document.querySelector('[data-save-settings]');
  if(saveSettingsBtn){
    saveSettingsBtn.addEventListener('click', ()=>{
      const id = saveSettingsBtn.dataset.saveSettings;
      const s = findSupplier(id);
      const name = document.getElementById('es-name').value.trim();
      const contact = document.getElementById('es-contact').value.trim();
      const address = document.getElementById('es-address').value.trim();
      const activeToggle = document.querySelector('[data-contact-toggle].active');
      const contactType = activeToggle ? activeToggle.dataset.contactToggle : s.contactType;
      if(!name || !contact){ showToast('Name and contact required'); return; }
      s.name=name; s.contact=contact; s.address=address; s.contactType=contactType;
      s.template.greeting = document.getElementById('es-greeting').value;
      s.template.orderLine = document.getElementById('es-orderline').value.trim();
      const udEl = document.getElementById('es-usualDay');
      if(udEl) s.template.usualDay = udEl.value.trim() || 'Tuesday';
      s.template.signoff = document.getElementById('es-signoff').value;
      const subjEl = document.getElementById('es-subject');
      s.template.subject = subjEl ? subjEl.value.trim() : '';
      saveData();
      showToast('Saved');
      goto({name:"supplier", id});
    });
  }

  const delSupBtn = document.querySelector('[data-del-supplier]');
  if(delSupBtn){
    delSupBtn.addEventListener('click', ()=>{
      if(confirm('Delete this supplier and all its products?')){
        state.suppliers = state.suppliers.filter(s=>s.id!==delSupBtn.dataset.delSupplier);
        saveData();
        goto({name:"list"});
      }
    });
  }

  function refreshTicket(){
    const s = findSupplier(state.view.id);
    if(!s) return;
    const items = s.products.filter(p=>p.qty>0);
    const msg = buildMessage(s, items, ticketDateWord);
    const disp = document.getElementById('date-word-display');
    if(disp) disp.textContent = ticketDateWord;
    const prev = document.getElementById('msg-preview');
    if(prev) prev.textContent = msg;
    const stamp = document.getElementById('send-stamp');
    if(stamp){
      const subject = (s.template.subject||'').replaceAll('{date}', ticketDateWord);
      stamp.setAttribute('href', buildSendLink(s, msg, subject));
    }
    document.querySelectorAll('[data-date-mode]').forEach(b=>{
      b.classList.toggle('active', b.dataset.dateMode===ticketDateMode);
    });
  }
  const tomBtn = document.querySelector('[data-date-mode="tomorrow"]');
  if(tomBtn) tomBtn.addEventListener('click', ()=>{
    ticketDateWord = 'tomorrow'; ticketDateMode = 'tomorrow'; refreshTicket();
  });
  const nextBtn = document.querySelector('[data-date-mode="nextday"]');
  if(nextBtn) nextBtn.addEventListener('click', ()=>{
    const s = findSupplier(state.view.id);
    const d = nextWeekday(s.template.usualDay || 'Tuesday');
    if(d){ ticketDateWord = formatDate(d); ticketDateMode = 'nextday'; refreshTicket(); }
  });
  const dateInput = document.getElementById('date-input');
  if(dateInput) dateInput.addEventListener('change', (e)=>{
    if(!e.target.value) return;
    const d = new Date(e.target.value+'T00:00:00');
    ticketDateWord = formatDate(d); ticketDateMode = 'calendar'; refreshTicket();
  });

  const stampBtn = document.getElementById('send-stamp');
  if(stampBtn){
    stampBtn.addEventListener('click', ()=>{
      const s = findSupplier(stampBtn.dataset.supplier);
      const items = s.products.filter(p=>p.qty>0);
      saveLastOrder(s);
      addHistory(s, items, ticketDateWord);
      stampBtn.classList.add('sent');
      showToast(s.contactType==='email' ? 'Opening mail...' : 'Opening Messages...');
    });
  }

  const copyBtn = document.getElementById('copy-btn');
  if(copyBtn){
    copyBtn.addEventListener('click', async ()=>{
      const s = findSupplier(copyBtn.dataset.supplier);
      const items = s.products.filter(p=>p.qty>0);
      const text = buildMessage(s, items, ticketDateWord);
      try{
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard');
      }catch(e){
        const area = document.getElementById('copy-area');
        area.style.display = 'block';
        area.value = text;
        area.select();
        showToast('Select & copy manually');
      }
    });
  }
}

loadData();

document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible' && state.view.name === 'sendseq'){
    render();
  }
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
