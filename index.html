<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Pass</title>
<meta name="theme-color" content="#F1EFE6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="The Pass">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root{--paper:#EDF0E1;--paper-dark:#E1E5D2;--ink:#24261F;--ink-soft:#4A4C3F;--muted:#6B6B5D;--stamp:#8B2E2E;--stamp-dark:#6E2222;--mustard:#C98A2C;--line:#c9cdb9;--card:#F7F8EF;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{background:var(--paper);background-image:repeating-linear-gradient(0deg,rgba(0,0,0,0.02) 0px,rgba(0,0,0,0.02) 1px,transparent 1px,transparent 3px);font-family:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;color:var(--ink);min-height:100vh;display:flex;justify-content:center;}
#app{width:100%;max-width:460px;min-height:100vh;padding:18px 16px 40px;position:relative;}
.brand{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--ink);}
.brand h1{font-size:15px;letter-spacing:3px;text-transform:uppercase;margin:0;font-weight:700;}
.brand .tag{font-size:10px;color:var(--muted);letter-spacing:1px;}
.crumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;flex-wrap:wrap;}
.crumb button{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:2px 0;text-decoration:underline;}
.card{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:14px 14px;margin-bottom:10px;box-shadow:0 1px 0 rgba(0,0,0,0.04);}
.supplier-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.supplier-row:active{background:var(--paper-dark);}
.supplier-name{font-size:14px;font-weight:700;letter-spacing:0.5px;}
.supplier-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.chev{color:var(--muted);font-size:14px;}
.badge{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border:1px solid var(--line);border-radius:10px;color:var(--muted);margin-left:6px;vertical-align:middle;}
.badge.sms{border-color:var(--mustard);color:var(--mustard);}
.badge.email{border-color:var(--ink-soft);color:var(--ink-soft);}
.btn{font-family:inherit;border:1.5px solid var(--ink);background:transparent;color:var(--ink);padding:9px 14px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border-radius:2px;cursor:pointer;}
.btn:active{background:var(--ink);color:var(--paper);}
.btn-block{width:100%;}
.btn-ghost{border-color:var(--line);color:var(--muted);}
.btn-danger{border-color:var(--stamp);color:var(--stamp);}
.btn-danger:active{background:var(--stamp);color:#fff;}
.add-row{display:flex;justify-content:center;margin-top:14px;}
.product-line{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);}
.product-line:last-child{border-bottom:none;}
.product-info{flex:1;min-width:0;}
.product-name{font-size:13px;font-weight:600;}
.product-unit{font-size:10px;color:var(--muted);letter-spacing:0.5px;}
.stepper{display:flex;align-items:center;gap:0;}
.stepper button{width:28px;height:28px;border:1px solid var(--ink);background:var(--card);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.stepper button:first-child{border-radius:2px 0 0 2px;}
.stepper button:last-child{border-radius:0 2px 2px 0;}
.stepper button:active{background:var(--ink);color:var(--paper);}
.stepper .qty-input{width:38px;text-align:center;font-size:14px;font-weight:700;border:none;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);height:28px;background:#fff;font-family:inherit;padding:0;-webkit-appearance:none;appearance:none;border-radius:0;}
.del-x{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 4px;font-family:inherit;margin-left:4px;}
.ticket{background:var(--card);border:1px solid var(--line);padding:0;position:relative;margin-bottom:16px;clip-path:polygon(0% 0%,3% 2%,6% 0%,9% 2%,12% 0%,15% 2%,18% 0%,21% 2%,24% 0%,27% 2%,30% 0%,33% 2%,36% 0%,39% 2%,42% 0%,45% 2%,48% 0%,51% 2%,54% 0%,57% 2%,60% 0%,63% 2%,66% 0%,69% 2%,72% 0%,75% 2%,78% 0%,81% 2%,84% 0%,87% 2%,90% 0%,93% 2%,96% 0%,100% 0%,100% 100%,0% 100%);padding-top:14px;}
.ticket-inner{padding:0 16px 16px;}
.ticket-head{text-align:center;padding-bottom:10px;border-bottom:1px solid var(--ink);margin-bottom:10px;}
.ticket-head .who{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.ticket-head .when{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
.ticket-line{display:flex;align-items:baseline;gap:6px;font-size:12.5px;padding:4px 0;}
.ticket-line .name{white-space:nowrap;}
.ticket-line .leader{flex:1;border-bottom:1px dotted var(--muted);margin:0 4px;transform:translateY(-3px);}
.ticket-line .qty{font-weight:700;white-space:nowrap;}
.ticket-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--ink);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.date-row{display:flex;align-items:center;gap:8px;margin:4px 0 14px;font-size:12px;}
.date-row label{white-space:nowrap;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;font-size:10.5px;}
.date-row input{flex:1;font-family:inherit;font-size:13px;padding:7px 8px;border:1px solid var(--ink);border-radius:2px;background:#fff;}
.preview-box{background:#fff;border:1px solid var(--line);border-radius:2px;padding:10px;margin-bottom:14px;font-size:11.5px;white-space:pre-wrap;color:var(--ink-soft);max-height:180px;overflow-y:auto;}
.stamp-wrap{display:flex;justify-content:center;margin:10px 0 6px;}
.stamp{width:120px;height:120px;border:3px double var(--stamp);border-radius:50%;color:var(--stamp);display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;transform:rotate(-8deg);background:transparent;cursor:pointer;transition:transform 0.15s ease;line-height:1.3;text-decoration:none;}
.stamp:active{transform:rotate(-8deg) scale(0.92);}
.stamp.sent{border-color:var(--stamp-dark);color:var(--stamp-dark);animation:thump 0.35s ease;}
@keyframes thump{0%{transform:rotate(-8deg) scale(1);}40%{transform:rotate(-8deg) scale(1.15);opacity:0.6;}100%{transform:rotate(-8deg) scale(1);}}
.fallback-note{font-size:10.5px;color:var(--muted);text-align:center;margin-top:8px;letter-spacing:0.5px;}
.form-card{background:var(--card);border:1.5px dashed var(--ink);padding:14px;margin-bottom:10px;border-radius:3px;}
.form-card label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:3px;margin-top:8px;}
.form-card input,.form-card textarea{width:100%;font-family:inherit;font-size:13px;padding:8px;border:1px solid var(--ink);border-radius:2px;background:#fff;resize:vertical;}
.hint{text-transform:none;letter-spacing:0;font-weight:400;color:var(--muted);}
.toggle-row{display:flex;gap:8px;margin-top:4px;}
.toggle-btn{flex:1;font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:8px;border:1px solid var(--ink);background:var(--card);color:var(--muted);border-radius:2px;cursor:pointer;}
.toggle-btn.active{background:var(--ink);color:var(--paper);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{font-family:inherit;font-size:10.5px;padding:5px 10px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink-soft);cursor:pointer;}
.settings-section{margin-top:18px;padding-top:14px;border-top:1px dashed var(--ink);}
.settings-section .sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.form-actions{display:flex;gap:8px;margin-top:12px;}
.form-actions .btn{flex:1;}
.empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:12px;letter-spacing:0.5px;}
textarea.copybox{width:100%;font-family:inherit;font-size:11px;padding:8px;border:1px solid var(--line);border-radius:2px;margin-top:8px;background:#fff;height:90px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:8px 16px;border-radius:3px;font-size:11px;letter-spacing:1px;text-transform:uppercase;z-index:50;opacity:0;pointer-events:none;transition:opacity 0.2s ease;}
.toast.show{opacity:1;}
.brand-right{display:flex;align-items:center;gap:12px;}
.home-btn{background:none;border:none;color:var(--ink);cursor:pointer;padding:0;display:flex;align-items:center;font-family:inherit;}
.home-btn svg{width:20px;height:20px;display:block;}
.home-btn:active{opacity:0.5;}
.clear-btn{background:none;border:1px solid var(--stamp);color:var(--stamp);cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:2px;white-space:nowrap;}
.clear-btn:active{background:var(--stamp);color:#fff;}
.supplier-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.date-pick{margin:6px 0 14px;}
.date-current{font-size:10.5px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;}
.date-current span{color:var(--ink);font-weight:700;text-transform:none;font-size:13px;letter-spacing:0;}
.date-btns{display:flex;gap:8px;}
.date-btn{flex:1;font-family:inherit;font-size:10.5px;letter-spacing:0.5px;text-transform:uppercase;padding:9px 4px;border:1px solid var(--ink);background:var(--card);color:var(--ink-soft);border-radius:2px;cursor:pointer;text-align:center;position:relative;overflow:hidden;}
.date-btn.active{background:var(--ink);color:var(--paper);}
.date-btn-cal input[type=date]{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none;cursor:pointer;}
a.btn-block{display:block;text-decoration:none;text-align:center;box-sizing:border-box;}
.home-tabs{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
.tab-card{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:22px 18px;cursor:pointer;font-family:inherit;box-shadow:0 1px 0 rgba(0,0,0,0.04);}
.tab-card:active{background:var(--paper-dark);}
.tab-title{font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink);}
.tab-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:0.3px;}
.menu-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.menu-row:active{background:var(--paper-dark);}
.menu-soon{opacity:0.55;}
.soon-tag{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:3px 9px;white-space:nowrap;}
.staff-legend{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.45;}
.staff-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.day-toggles{display:flex;gap:7px;}
.day-tog{flex:1;font-family:inherit;font-size:13px;font-weight:700;padding:11px 0;border:1px solid var(--ink);background:var(--card);color:var(--muted);border-radius:3px;cursor:pointer;}
.day-tog.active{background:var(--ink);color:var(--paper);}
.rday-tabs{display:flex;gap:6px;margin-bottom:14px;}
.rday-tab{flex:1;font-family:inherit;font-size:12px;font-weight:700;padding:9px 0;border:1px solid var(--ink);background:var(--card);color:var(--muted);border-radius:3px;cursor:pointer;}
.rday-tab.active{background:var(--ink);color:var(--paper);}
.rday-title{font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:10px;}
.rstaff{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:12px 13px;margin-bottom:9px;}
.rstaff-off{opacity:0.72;border-style:dashed;}
.rstaff-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.rstaff-name{font-size:14px;font-weight:700;}
.off-badge{font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mustard);border:1px solid var(--mustard);border-radius:8px;padding:1px 6px;margin-left:4px;}
.rstaff-clear{background:none;border:none;color:var(--stamp);font-family:inherit;font-size:11px;text-decoration:underline;cursor:pointer;}
.rstaff-controls{display:flex;gap:10px;}
.rfield{flex:1;display:flex;flex-direction:column;gap:3px;}
.rfield span{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.rfield input[type=time]{font-family:inherit;font-size:14px;padding:8px;border:1px solid var(--ink);border-radius:3px;background:#fff;color:var(--ink);}
.rstation{width:100%;margin-top:9px;font-family:inherit;font-size:13px;padding:9px 8px;border:1px solid var(--ink);border-radius:3px;background:#fff;color:var(--ink);}
.roff-divider{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;padding-top:10px;border-top:1px dashed var(--line);text-align:center;}
.ts-day{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:12px 13px;margin-bottom:9px;}
.ts-day-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.ts-day-name{font-size:14px;font-weight:700;}
.ts-hours{font-size:12px;font-weight:700;color:var(--stamp);letter-spacing:0.3px;}
.ts-controls{display:flex;gap:10px;}
.ts-total{margin-top:14px;padding:12px 14px;background:var(--paper-dark);border:1px solid var(--ink);border-radius:4px;font-size:14px;letter-spacing:0.5px;text-align:center;text-transform:uppercase;}
.ts-total strong{color:var(--stamp);}
</style>

:root{--paper:#F1EFE6;--paper-dark:#E7E4D6;--ink:#262319;--ink-soft:#4C483D;--muted:#8A8677;--stamp:#A5372F;--stamp-dark:#8B2E2E;--mustard:#B07A22;--line:#E7E4D7;--card:#FFFFFF;}
body{font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);background-image:none;color:var(--ink);-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;}
#app{padding:16px 16px 46px;}
.brand{border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:16px;align-items:center;}
.brand h1{font-size:20px;letter-spacing:-0.3px;text-transform:none;font-weight:800;}
.brand .tag{font-size:10px;color:var(--muted);letter-spacing:0.2px;text-transform:none;}
.home-btn{color:var(--ink);}
.crumb{color:var(--muted);text-transform:none;letter-spacing:0.2px;font-size:12px;}
.crumb button{text-decoration:none;color:var(--ink-soft);font-weight:600;text-transform:none;letter-spacing:0.2px;font-size:12px;}
.crumb button:active{color:var(--stamp);}
.card,.form-card,.rstaff,.ts-day,.tab-card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(38,35,25,.04),0 8px 22px rgba(38,35,25,.05);}
.supplier-row:active,.menu-row:active,.tab-card:active{background:#FBFAF4;}
.supplier-name{font-size:15px;font-weight:700;letter-spacing:0;}
.supplier-meta{color:var(--muted);}
.btn{border:none;border-radius:999px;background:var(--ink);color:#fff;font-weight:700;letter-spacing:0.6px;padding:13px 20px;text-transform:uppercase;font-size:11px;}
.btn:active{background:#000;color:#fff;}
a.btn-block{display:block;}
.btn-ghost{background:#EDEBDF;color:#5B584C;border:none;}
.btn-ghost:active{background:#E3E0D2;color:var(--ink);}
.btn-danger{background:var(--stamp);color:#fff;border:none;}
.btn-danger:active{background:var(--stamp-dark);color:#fff;}
.clear-btn{border-radius:999px;border:1px solid var(--stamp);color:var(--stamp);padding:6px 14px;}
.clear-btn:active{background:var(--stamp);color:#fff;}
.stepper button{border:1px solid var(--line);background:#F6F5EE;color:var(--ink);}
.stepper button:first-child{border-radius:11px 0 0 11px;}
.stepper button:last-child{border-radius:0 11px 11px 0;}
.stepper button:active{background:var(--ink);color:#fff;}
.stepper .qty-input{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff;font-weight:700;}
.del-x{color:var(--muted);}
.tab-title{text-transform:none;letter-spacing:0;font-size:20px;font-weight:800;}
.tab-sub{color:var(--muted);}
.badge{border-radius:999px;padding:3px 10px;border:1px solid var(--line);}
.badge.sms{border-color:#E3C79A;color:#9A6A1B;background:#FBF3E2;}
.badge.email{border-color:#DCD8C8;color:#5B584C;background:#F4F2E8;}
.day-tog,.rday-tab,.date-btn,.toggle-btn{border:1px solid var(--line);background:#F6F5EE;color:var(--ink-soft);border-radius:12px;}
.day-tog.active,.rday-tab.active,.date-btn.active,.toggle-btn.active{background:var(--ink);border-color:var(--ink);color:#fff;}
.chip{border:1px solid var(--line);background:#F6F5EE;color:var(--ink-soft);border-radius:999px;}
.form-card input,.form-card textarea,.rfield input[type=time],.rstation,.date-row input,.qty-input{border:1px solid var(--line);border-radius:11px;background:#fff;}
.form-card input:focus,.form-card textarea:focus,.rstation:focus,.form-card input:focus-visible{outline:none;border-color:var(--ink);}
.form-card label,.rfield span,.settings-section .sec-title,.date-current{color:var(--muted);}
.preview-box{border:1px solid var(--line);border-radius:12px;background:#FCFBF6;}
.date-current span{color:var(--ink);}
.ticket{border:1px solid var(--line);}
.ts-total{border:none;border-radius:14px;background:#EDEBDF;text-transform:none;letter-spacing:0;font-size:14px;}
.ts-day-name,.rstaff-name{font-weight:700;}

function fmtTime(hhmm, spaced){
  if(!hhmm) return '';
  const parts = String(hhmm).split(':');
  const h = parseInt(parts[0],10), m = parseInt(parts[1],10);
  if(isNaN(h)||isNaN(m)) return '';
  const ampm = h>=12 ? 'pm' : 'am';
  let h12 = h%12; if(h12===0) h12=12;
  const sep = spaced ? ' ' : '';
  return m===0 ? `${h12}${sep}${ampm}` : `${h12}:${String(m).padStart(2,'0')}${sep}${ampm}`;
}
function fmtTime12(hhmm){ const s = fmtTime(hhmm, true); return s.replace('am','AM').replace('pm','PM'); }
function timeFieldHTML(label, attr, id, val){
  const disp = val ? fmtTime12(val) : 'Set';
  return `<div class="rfield"><span>${label}</span><div class="tf"><span class="tf-val ${val?'':'tf-empty'}">${disp}</span><input type="time" ${attr}="${id}" value="${val||''}"></div></div>`;
}
function stationRank(s){ const i = STATIONS.indexOf(s); return i<0 ? 99 : i; }
function buildRosterText(){
  const blocks = [];
  ROSTER_DAY_KEYS.forEach(k=>{
    const entries = state.roster[k] || {};
    let scheduled = state.staff.filter(st=> entries[st.id] && entries[st.id].start);
    if(scheduled.length===0) return;
    scheduled = scheduled.slice().sort((a,b)=>{
      const ra = stationRank(entries[a.id].station), rb = stationRank(entries[b.id].station);
      if(ra!==rb) return ra-rb;
      return (entries[a.id].start||'').localeCompare(entries[b.id].start||'');
    });
    const lines = [ROSTER_DAY_FULL[k]];
    scheduled.forEach(st=>{
      const e = entries[st.id];
      const t = e.end ? `${fmtTime(e.start)} - ${fmtTime(e.end)}` : fmtTime(e.start);
      const prefix = e.station ? `${e.station}: ` : '';
      lines.push(`${prefix}${st.name} (${t})`);
    });
    blocks.push(lines.join('\n'));
  });
  return blocks.join('\n\n');
}

function hoursBetween(startHHMM, endHHMM){
  if(!startHHMM || !endHHMM) return 0;
  const [sh,sm] = startHHMM.split(':').map(Number);
  const [eh,em] = endHHMM.split(':').map(Number);
  let mins = (eh*60+em) - (sh*60+sm);
  if(mins < 0) mins += 24*60;
  return mins/60;
}
function fmtNum(x){ return String(parseFloat(x.toFixed(2))); }
function effectiveTs(day, rid){
  const ov = state.timesheet && state.timesheet[day];
  if(ov) return { start: ov.start||'', end: ov.end||'' };
  const rs = (state.roster[day] && rid && state.roster[day][rid] && state.roster[day][rid].start) || '';
  return { start: rs, end: rs ? '21:00' : '' };
}
function buildTimesheetText(){
  const rid = rabindraId();
  const meObj = state.staff.find(s=>s.id===rid);
  const name = meObj ? meObj.name : 'Rabindra';
  const dayLabels = [['wed','Wed'],['thu','Thu'],['fri','Fri'],['sat','Sat'],['sun','Sun']];
  const lines = [name+':', ''];
  let total = 0, any = false;
  dayLabels.forEach(([k,lbl])=>{
    const e = effectiveTs(k, rid);
    if(!e.start) return;
    any = true;
    if(e.end){
      const h = hoursBetween(e.start, e.end);
      total += h;
      lines.push(`${lbl}: ${fmtTime(e.start,true)} - ${fmtTime(e.end,true)} (${fmtNum(h)})`);
    } else {
      lines.push(`${lbl}: ${fmtTime(e.start,true)}`);
    }
  });
  if(!any) return '';
  lines.push('');
  lines.push(`Total hours: ${fmtNum(total)} hrs`);
  return lines.join('\n');
}

function uid(){ return Math.random().toString(36).slice(2,9); }
function formatQty(q){ return String(Math.round(q*100)/100); }

function ordinal(day){
  const suf = (day>3 && day<21) ? 'th' : ['th','st','nd','rd'][day%10 > 3 ? 0 : day%10];
  return day + suf;
}
function formatDate(d){
  return ordinal(d.getDate()) + ' ' + d.toLocaleString('en-AU', {month:'long'});
}
function nextWeekday(name){
  const names = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const target = names.indexOf(String(name||'').toLowerCase());
  if(target < 0) return null;
  const now = new Date();
  let diff = (target - now.getDay() + 7) % 7;
  if(diff === 0) diff = 7;
  const d = new Date(now);
  d.setDate(now.getDate() + diff);
  return d;
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function buildMessage(supplier, items, dateWord){
  const t = supplier.template;
  if(t.mode === 'freeform'){
    const first = items[0] || {name:'', qty:0, unit:''};
    const itemLines = items.map(p=>`${p.name}: ${formatQty(p.qty)} ${p.unit}`).join('\n');
    return (t.body||'')
      .replaceAll('{date}', dateWord)
      .replaceAll('{items}', itemLines)
      .replaceAll('{qty}', formatQty(first.qty))
      .replaceAll('{unit}', first.unit)
      .replaceAll('{product}', first.name);
  }
  const lines = [];
  if(t.greeting) lines.push(t.greeting);
  if(t.orderLine) lines.push(t.orderLine.replaceAll('{date}', dateWord));
  lines.push('');
  items.forEach(p=> lines.push(`${p.name}: ${formatQty(p.qty)} ${p.unit}`));
  lines.push('');
  if(t.signoff) lines.push(t.signoff);
  return lines.join('\n');
}

function buildSendLink(supplier, message, subject){
  if(supplier.contactType === 'email'){
    return `mailto:${supplier.contact}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
  } else {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const sep = isIOS ? '&' : '?';
    return `sms:${supplier.contact}${sep}body=${encodeURIComponent(message)}`;
  }
}

function renderTimesheet(){

  const dayRows = [['wed','Wednesday'],['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']];
  let total = 0;
  const rows = dayRows.map(([k,full])=>{
    const e = effectiveTs(k, rid);
    const h = (e.start && e.end) ? hoursBetween(e.start, e.end) : 0;
    if(e.start && e.end) total += h;
    const hoursLabel = (e.start && e.end) ? `${fmtNum(h)} hrs` : (e.start ? 'set end' : 'off');
    return `

  return `

}

  const tabs = dayTabs.map(([k,lbl])=>`<button class="rday-tab ${rosterDay===k?'active':''}" data-rday="${k}">${lbl}</button>`).join('');
  const entries = state.roster[rosterDay] || {};
  const avail = state.staff.filter(st=> st.avail && st.avail[rosterDay]);
  const offStaff = state.staff.filter(st=> !(st.avail && st.avail[rosterDay]));

  function staffBlock(st, isOff){
    const e = entries[st.id] || {};
    const scheduled = !!e.start;
    const stationOpts = ['<option value="">No station</option>']
      .concat(STATIONS.map(s=>`<option value="${s}" ${e.station===s?'selected':''}>${s}</option>`)).join('');
    return `
      <div class="rstaff ${isOff?'rstaff-off':''}">
        <div class="rstaff-top">
          <span class="rstaff-name">${escapeHtml(st.name)}${isOff?' <span class="off-badge">off-day</span>':''}</span>
          ${scheduled?`<button class="rstaff-clear" data-rclear="${st.id}">clear</button>`:''}
        </div>
        <div class="rstaff-controls">
          ${timeFieldHTML('Start','data-rstart',st.id,e.start||'')}
          ${scheduled?timeFieldHTML('End','data-rend',st.id,e.end||''):''}
        </div>
        ${scheduled?`<select class="rstation" data-rstation="${st.id}">${stationOpts}</select>`:''}
      </div>
    `;
  }

  let availHtml = avail.map(st=>staffBlock(st,false)).join('');
  if(avail.length===0) availHtml = `<div class="empty">Nobody's set to work ${ROSTER_DAY_FULL[rosterDay]}.<br>Set availability in Staff, or use "show all" below.</div>`;

  let offHtml = '';
  if(rosterShowAll && offStaff.length){
    offHtml = `<div class="roff-divider">Covering an off-day</div>` + offStaff.map(st=>staffBlock(st,true)).join('');
  }
  const showAllBtn = offStaff.length ? `<div class="add-row" style="margin-top:6px;"><button class="btn btn-ghost" data-rtoggle-all="1">${rosterShowAll?'Hide off-day staff':'+ Show all staff'}</button></div>` : '';

  return `
    <div class="crumb"><button data-goto="roster">&larr; Rostering</button> / Build Roster</div>
    <div class="rday-tabs">${tabs}</div>
    <div class="rday-title">${ROSTER_DAY_FULL[rosterDay]}</div>
    ${availHtml}
    ${offHtml}
    ${showAllBtn}
    <div style="margin-top:18px;"><button class="btn btn-block" id="roster-publish">Publish Roster &rarr;</button></div>
    <div style="margin-top:10px;"><button class="btn btn-ghost btn-block" id="roster-copy">Copy Roster Text</button></div>
    <textarea class="copybox" id="roster-copy-area" style="display:none;" readonly></textarea>
    <div class="fallback-note">Publish opens your share sheet &mdash; pick your notes or messaging app. Times, stations &amp; the whole week are included.</div>
  `;
}

function bindContactToggle(){
  document.querySelectorAll('[data-contact-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('[data-contact-toggle]').forEach(b=>b.classList.remove('active'));
      el.classList.add('active');
      const type = el.dataset.contactToggle;
      const label = document.getElementById('contact-label');
      const input = document.getElementById('ns-contact') || document.getElementById('es-contact');
      if(label && input){
        if(type==='sms'){ label.textContent='Phone number'; input.placeholder='+61412345678'; input.setAttribute('inputmode','tel'); }
        else { label.textContent='Order email'; input.placeholder='orders@supplier.com.au'; input.setAttribute('inputmode','email'); }
      }
      const subjWrap = document.getElementById('subject-wrap');
      if(subjWrap) subjWrap.style.display = type==='email' ? 'block' : 'none';
    });
  });
}

function attachHandlers(){
  document.querySelectorAll('[data-open-supplier]').forEach(el=>{
    el.addEventListener('click', ()=> goto({name:"supplier", id:el.dataset.openSupplier}));
  });
  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=>{ goto({name:el.dataset.goto, id:el.dataset.supplier}); });
  });
  document.querySelectorAll('[data-qty-inc]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.qtyInc));
      const p = s.products.find(p=>p.id===el.dataset.qtyInc);
      p.qty = Math.round((p.qty+(p.inc||1))*100)/100; saveData(); render();
    });
  });
  document.querySelectorAll('[data-qty-dec]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.qtyDec));
      const p = s.products.find(p=>p.id===el.dataset.qtyDec);
      p.qty = Math.max(0, Math.round((p.qty-(p.inc||1))*100)/100); saveData(); render();
    });
  });
  document.querySelectorAll('[data-qty-input]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.qtyInput));
      const p = s.products.find(p=>p.id===el.dataset.qtyInput);
      let v = parseFloat(el.value);
      if(isNaN(v)||v<0) v = 0;
      p.qty = Math.round(v*100)/100;
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-del-product]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = state.suppliers.find(s=>s.products.some(p=>p.id===el.dataset.delProduct));
      s.products = s.products.filter(p=>p.id!==el.dataset.delProduct);
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-repeat]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = findSupplier(el.dataset.repeat);
      const last = getLastOrder(s.id) || {};
      if(Object.keys(last).length===0){ showToast('No saved order for '+s.name+' yet'); return; }
      s.products.forEach(p=>{ p.qty = last[p.id] ? last[p.id] : 0; });
      saveData(); render(); showToast('Last order loaded');
    });
  });
  document.querySelectorAll('[data-clear]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const s = findSupplier(el.dataset.clear);
      s.products.forEach(p=>{ p.qty = 0; });
      saveData(); render(); showToast('Order cleared');
    });
  });
  document.querySelectorAll('[data-unit-chip]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const t = document.getElementById('np-unit') || document.getElementById('ep-unit');
      if(t) t.value = el.dataset.unitChip;
    });
  });
  document.querySelectorAll('[data-edit-product]').forEach(el=>{
    el.addEventListener('click', ()=> goto({name:'editProduct', id: el.dataset.supplier, pid: el.dataset.editProduct}));
  });
  const saveEditBtn = document.querySelector('[data-save-edit]');
  if(saveEditBtn){
    saveEditBtn.addEventListener('click', ()=>{
      const s = findSupplier(saveEditBtn.dataset.supplier);
      const p = s && s.products.find(x=>x.id===saveEditBtn.dataset.saveEdit);
      if(!p) return;
      const name = document.getElementById('ep-name').value.trim();
      if(!name){ showToast('Product name required'); return; }
      p.name = name;
      p.unit = document.getElementById('ep-unit').value.trim() || 'kg';
      let inc = parseFloat(document.getElementById('ep-inc').value);
      if(!isNaN(inc) && inc > 0) p.inc = Math.round(inc*100)/100;
      saveData();
      goto({name:'supplier', id: s.id});
      showToast('Product updated');
    });
  }
  document.querySelectorAll('[data-staff-day]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const [sid, day] = el.dataset.staffDay.split(':');
      const st = findStaff(sid);
      if(st){ if(!st.avail) st.avail = {}; st.avail[day] = !st.avail[day]; saveStaff(); render(); }
    });
  });
  document.querySelectorAll('[data-del-staff]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(confirm('Remove this staff member?')){
        state.staff = state.staff.filter(s=>s.id!==el.dataset.delStaff);
        saveStaff(); render();
      }
    });
  });
  const saveStaffBtn = document.querySelector('[data-save-staff]');
  if(saveStaffBtn){
    saveStaffBtn.addEventListener('click', ()=>{
      const name = document.getElementById('nst-name').value.trim();
      if(!name){ showToast('Name required'); return; }
      state.staff.push({ id: uid(), name, avail:{wed:true,thu:true,fri:true,sat:true,sun:true} });
      saveStaff(); goto({name:'staff'});
    });
  }
  document.querySelectorAll('[data-soon]').forEach(el=>{
    el.addEventListener('click', ()=> showToast('Coming in the next update'));
  });
  const rerenderKeepScroll = ()=>{ const y=window.scrollY; render(); window.scrollTo(0,y); };
  document.querySelectorAll('[data-rday]').forEach(el=>{
    el.addEventListener('click', ()=>{ rosterDay = el.dataset.rday; rosterShowAll = false; render(); });
  });
  document.querySelectorAll('[data-rstart]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const sid = el.dataset.rstart;
      if(!state.roster[rosterDay]) state.roster[rosterDay] = {};
      const day = state.roster[rosterDay];
      if(!el.value){ delete day[sid]; }
      else { if(!day[sid]) day[sid] = {start:'',end:'',station:''}; day[sid].start = el.value; }
      saveRoster(); rerenderKeepScroll();
    });
  });
  document.querySelectorAll('[data-rend]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const sid = el.dataset.rend; const day = state.roster[rosterDay];
      if(day && day[sid]){ day[sid].end = el.value; saveRoster(); }
    });
  });
  document.querySelectorAll('[data-rstation]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const sid = el.dataset.rstation; const day = state.roster[rosterDay];
      if(day && day[sid]){ day[sid].station = el.value; saveRoster(); }
    });
  });
  document.querySelectorAll('[data-rclear]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const sid = el.dataset.rclear;
      if(state.roster[rosterDay]) delete state.roster[rosterDay][sid];
      saveRoster(); rerenderKeepScroll();
    });
  });
  const rtoggle = document.querySelector('[data-rtoggle-all]');
  if(rtoggle) rtoggle.addEventListener('click', ()=>{ rosterShowAll = !rosterShowAll; rerenderKeepScroll(); });
  const rpub = document.getElementById('roster-publish');
  if(rpub) rpub.addEventListener('click', ()=>{
    const text = buildRosterText();
    if(!text){ showToast('Roster is empty'); return; }
    if(navigator.share){ navigator.share({text}).catch(()=>{}); }
    else {
      navigator.clipboard.writeText(text).then(()=>showToast('Copied - share sheet not available')).catch(()=>{
        const area = document.getElementById('roster-copy-area');
        if(area){ area.style.display='block'; area.value=text; area.select(); }
        showToast('Select & copy manually');
      });
    }
  });
  const rcopy = document.getElementById('roster-copy');
  if(rcopy) rcopy.addEventListener('click', ()=>{
    const text = buildRosterText();
    if(!text){ showToast('Roster is empty'); return; }
    navigator.clipboard.writeText(text).then(()=>showToast('Roster copied')).catch(()=>{
      const area = document.getElementById('roster-copy-area');
      if(area){ area.style.display='block'; area.value=text; area.select(); }
      showToast('Select & copy manually');
    });
  });
  const rid = rabindraId();
  document.querySelectorAll('[data-ts-start]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const day = el.dataset.tsStart;
      const cur = effectiveTs(day, rid);
      state.timesheet[day] = { start: el.value, end: el.value ? cur.end : '' };
      saveTimesheet(); rerenderKeepScroll();
    });
  });
  document.querySelectorAll('[data-ts-end]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const day = el.dataset.tsEnd;
      const cur = effectiveTs(day, rid);
      state.timesheet[day] = { start: cur.start, end: el.value };
      saveTimesheet(); rerenderKeepScroll();
    });
  });
  const tsSubmit = document.getElementById('ts-submit');
  if(tsSubmit) tsSubmit.addEventListener('click', ()=>{
    const text = buildTimesheetText();
    if(!text){ showToast('Timesheet is empty'); return; }
    if(navigator.share){ navigator.share({text}).catch(()=>{}); }
    else {
      navigator.clipboard.writeText(text).then(()=>showToast('Copied - share sheet not available')).catch(()=>{
        const area = document.getElementById('ts-copy-area');
        if(area){ area.style.display='block'; area.value=text; area.select(); }
        showToast('Select & copy manually');
      });
    }
  });
  const tsCopy = document.getElementById('ts-copy');
  if(tsCopy) tsCopy.addEventListener('click', ()=>{
    const text = buildTimesheetText();
    if(!text){ showToast('Timesheet is empty'); return; }
    navigator.clipboard.writeText(text).then(()=>showToast('Timesheet copied')).catch(()=>{
      const area = document.getElementById('ts-copy-area');
      if(area){ area.style.display='block'; area.value=text; area.select(); }
      showToast('Select & copy manually');
    });
  });
  const tsReset = document.getElementById('ts-reset');
  if(tsReset) tsReset.addEventListener('click', ()=>{
    if(confirm('Reset the timesheet to match your current roster? This clears your adjustments.')){
      state.timesheet = {}; saveTimesheet(); render(); showToast('Reset to roster');
    }
  });
  bindContactToggle();

  const saveSupBtn = document.querySelector('[data-save-supplier]');
  if(saveSupBtn){
    saveSupBtn.addEventListener('click', ()=>{
      const name = document.getElementById('ns-name').value.trim();
      const contact = document.getElementById('ns-contact').value.trim();
      const address = document.getElementById('ns-address').value.trim();
      const activeToggle = document.querySelector('[data-contact-toggle].active');
      const contactType = activeToggle ? activeToggle.dataset.contactToggle : 'sms';
      if(!name || !contact){ showToast('Name and contact required'); return; }
      state.suppliers.push({ id: uid(), name, contactType, contact, address, products: [], template: defaultTemplate(contactType) });
      saveData();
      goto({name:"list"});
    });
  }

  const saveProdBtn = document.querySelector('[data-save-product]');
  if(saveProdBtn){
    saveProdBtn.addEventListener('click', ()=>{
      const supplierId = saveProdBtn.dataset.saveProduct;
      const s = findSupplier(supplierId);
      const name = document.getElementById('np-name').value.trim();
      const unit = document.getElementById('np-unit').value.trim() || 'kg';
      let inc = parseFloat(document.getElementById('np-inc').value); if(isNaN(inc)||inc<=0) inc = 1;
      if(!name){ showToast('Product name required'); return; }
      s.products.push({ id: uid(), name, unit, qty:0, inc: Math.round(inc*100)/100 });
      saveData();
      goto({name:"supplier", id:supplierId});
    });
  }

  const saveSettingsBtn = document.querySelector('[data-save-settings]');
  if(saveSettingsBtn){
    saveSettingsBtn.addEventListener('click', ()=>{
      const id = saveSettingsBtn.dataset.saveSettings;
      const s = findSupplier(id);
      const name = document.getElementById('es-name').value.trim();
      const contact = document.getElementById('es-contact').value.trim();
      const address = document.getElementById('es-address').value.trim();
      const activeToggle = document.querySelector('[data-contact-toggle].active');
      const contactType = activeToggle ? activeToggle.dataset.contactToggle : s.contactType;
      if(!name || !contact){ showToast('Name and contact required'); return; }
      s.name=name; s.contact=contact; s.address=address; s.contactType=contactType;
      const gEl = document.getElementById('es-greeting');
      if(gEl) s.template.greeting = gEl.value;
      const olEl = document.getElementById('es-orderline');
      if(olEl) s.template.orderLine = olEl.value.trim();
      const udEl = document.getElementById('es-usualDay');
      if(udEl) s.template.usualDay = udEl.value.trim() || 'Tuesday';
      const soEl = document.getElementById('es-signoff');
      if(soEl) s.template.signoff = soEl.value;
      const subjEl = document.getElementById('es-subject');
      if(subjEl) s.template.subject = subjEl.value.trim();
      const bodyEl = document.getElementById('es-body');
      if(bodyEl) s.template.body = bodyEl.value;
      saveData();
      showToast('Saved');
      goto({name:"supplier", id});
    });
  }

  const delSupBtn = document.querySelector('[data-del-supplier]');
  if(delSupBtn){
    delSupBtn.addEventListener('click', ()=>{
      if(confirm('Delete this supplier and all its products?')){
        state.suppliers = state.suppliers.filter(s=>s.id!==delSupBtn.dataset.delSupplier);
        saveData();
        goto({name:"list"});
      }
    });
  }

  function refreshTicket(){
    const s = findSupplier(state.view.id);
    if(!s) return;
    const items = s.products.filter(p=>p.qty>0);
    const msg = buildMessage(s, items, ticketDateWord);
    const disp = document.getElementById('date-word-display');
    if(disp) disp.textContent = ticketDateWord;
    const prev = document.getElementById('msg-preview');
    if(prev) prev.textContent = msg;
    const stamp = document.getElementById('send-stamp');
    if(stamp){
      const subject = (s.template.subject||'').replaceAll('{date}', ticketDateWord);
      stamp.setAttribute('href', buildSendLink(s, msg, subject));
    }
    document.querySelectorAll('[data-date-mode]').forEach(b=>{
      b.classList.toggle('active', b.dataset.dateMode===ticketDateMode);
    });
  }
  const tomBtn = document.querySelector('[data-date-mode="tomorrow"]');
  if(tomBtn) tomBtn.addEventListener('click', ()=>{
    ticketDateWord = 'tomorrow'; ticketDateMode = 'tomorrow'; refreshTicket();
  });
  const nextBtn = document.querySelector('[data-date-mode="nextday"]');
  if(nextBtn) nextBtn.addEventListener('click', ()=>{
    const s = findSupplier(state.view.id);
    const d = nextWeekday(s.template.usualDay || 'Tuesday');
    if(d){ ticketDateWord = formatDate(d); ticketDateMode = 'nextday'; refreshTicket(); }
  });
  const dateInput = document.getElementById('date-input');
  if(dateInput) dateInput.addEventListener('change', (e)=>{
    if(!e.target.value) return;
    const d = new Date(e.target.value+'T00:00:00');
    ticketDateWord = formatDate(d); ticketDateMode = 'calendar'; refreshTicket();
  });

  const stampBtn = document.getElementById('send-stamp');
  if(stampBtn){
    stampBtn.addEventListener('click', ()=>{
      const s = findSupplier(stampBtn.dataset.supplier);
      saveLastOrder(s);
      stampBtn.classList.add('sent');
      showToast(s.contactType==='email' ? 'Opening mail...' : 'Opening Messages...');
    });
  }

  const copyBtn = document.getElementById('copy-btn');
  if(copyBtn){
    copyBtn.addEventListener('click', async ()=>{
      const s = findSupplier(copyBtn.dataset.supplier);
      const items = s.products.filter(p=>p.qty>0);
      const text = buildMessage(s, items, ticketDateWord);
      try{
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard');
      }catch(e){
        const area = document.getElementById('copy-area');
        area.style.display = 'block';
        area.value = text;
        area.select();
        showToast('Select & copy manually');
      }
    });
  }
}

try{ history.replaceState({view:{name:'home'}}, ''); }catch(e){}
window.addEventListener('popstate', (e)=>{
  state.view = (e.state && e.state.view) ? e.state.view : {name:'home'};
  render();
});

loadData();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
